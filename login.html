<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Masuk | Sistem Draf Laporan Polis</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="login-body">
  <main class="login-page">
    <section class="login-card">
      <img src="public/pdrm.png" alt="Logo PDRM" class="login-logo" />

      <h1 class="login-title">Sistem Draf Laporan Polis</h1>
      <p class="login-subtitle">
        Penjanaan draf laporan berdasarkan maklumat pengadu
      </p>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="userId">ID Pengguna</label>
          <input type="text" id="userId" name="userId" placeholder="Masukkan ID Pengguna" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Kata Laluan</label>
          <input type="password" id="password" name="password" placeholder="Masukkan Kata Laluan" autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full">Log Masuk</button>

        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="assets/auth.js"></script>
</body>
</html>
